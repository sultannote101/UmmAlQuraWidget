name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract ZIP
        run: |
          unzip -o UmmAlQuraWidget.zip
          ls -la
          ls -la UmmAlQuraWidget/

      - name: Grant execute permission to gradlew
        run: chmod +x UmmAlQuraWidget/gradlew

      - name: Build Debug APK
        working-directory: UmmAlQuraWidget
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UmmAlQuraWidget-APK
          path: UmmAlQuraWidget/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
