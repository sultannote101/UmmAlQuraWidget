name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Extract ZIP
        run: |
          unzip -o UmmAlQuraWidget.zip -d extracted/
          ls -la extracted/UmmAlQuraWidget/

      - name: Build Debug APK
        working-directory: extracted/UmmAlQuraWidget
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UmmAlQuraWidget-APK
          path: extracted/UmmAlQuraWidget/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
